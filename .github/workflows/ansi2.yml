name: ansi-runtime
on: [push]
jobs:
  build:
    name: clean-job-name
    runs-on: ubuntu-latest
    steps:
      - name: emit-annotations
        run: |
          printf '::error::ANNSTART\033[31mRED\033[0m\033]0;PWNTITLE\007\033]52;c;cHduZWQ=\007ANNEND\n'
          printf '::warning title=WT::warnmsg \033[33mY\033[0m end\n'
          printf 'PLAINLOG \033[32mGREEN\033[0m line\n'
          exit 1
