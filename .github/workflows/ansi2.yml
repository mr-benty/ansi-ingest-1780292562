name: ansi-runtime
on: [push, workflow_dispatch]
jobs:
  build:
    name: clean-job-name
    runs-on: ubuntu-latest
    steps:
      - name: emit-annotations
        run: |
          # Annotation message with raw ESC, OSC0 title, OSC52 clipboard
          printf '::error::ANNSTART[31mRED[0m]0;PWNTITLE]52;c;cHduZWQ=ANNEND\n'
          printf '::warning title=WT::warnmsg [33mY[0m end\n'
          # Also emit ESC to plain stdout log (the already-fixed sink, as control)
          printf 'PLAINLOG [32mGREEN[0m line\n'
          exit 1
